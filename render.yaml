# Render 一键部署后端（在 Render 选 Blueprint / 从 render.yaml 部署）
# https://dashboard.render.com

services:
  - type: web
    name: oracle-api
    runtime: node
    plan: free
    region: singapore
    # 只装 API 依赖（Next/Three 在 devDependencies），避免免费版 512MB 内存装包 OOM
    buildCommand: npm install --omit=dev
    startCommand: npm run server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # 不要写死 PORT=3002；Render 会自动注入 PORT，写死会导致部署失败
      - key: BETA_MODE
        value: "true"
      - key: DAILY_FREE_READINGS
        value: "3"
      - key: PAYMENT_DEV_MODE
        value: "true"
      - key: CORS_ORIGIN
        value: https://oracletarot.top,https://www.oracletarot.top
      - key: JWT_SECRET
        generateValue: true
      - key: DEEPSEEK_API_KEY
        sync: false
