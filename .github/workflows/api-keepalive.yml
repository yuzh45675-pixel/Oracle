# 每 14 分钟 ping 一次 Render 后端，减轻免费版休眠导致登录卡死
name: API Keepalive

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check Render API health
        run: |
          URL="https://oracle-api-ug81.onrender.com/api/health"
          for attempt in 1 2 3; do
            echo "Attempt $attempt: $URL"
            body="$(curl -fsS --max-time 90 "$URL" || true)"
            if echo "$body" | grep -q '"ok"[[:space:]]*:[[:space:]]*true'; then
              echo "Backend OK: $body"
              exit 0
            fi
            echo "Not ready yet, waiting 15s..."
            sleep 15
          done
          echo "Backend health check failed after 3 attempts"
          exit 1

      - name: Check Vercel API proxy
        run: |
          URL="https://oracle-tarot-xi.vercel.app/api-server/api/health"
          body="$(curl -fsS --max-time 30 "$URL")"
          echo "$body" | grep -q '"ok"[[:space:]]*:[[:space:]]*true'
          echo "Vercel proxy OK: $body"
